services:
  api-v2:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api.v2
    ports:
      - "8080:8080"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"
      interval: 10s
      timeout: 3s
      retries: 5

  web-v2:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web.v2
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3020:3020"
    depends_on:
      api-v2:
        condition: service_healthy
